name: Check samenvattingen

# Wordt extern getriggerd via cron-job.org (elke 10 min); GitHub's eigen scheduler bleek onbetrouwbaar. Vlak na een wedstrijd staat de samenvatting daardoor
# meestal binnen een kwartier na publicatie automatisch in de app. Buiten
# wedstrijden stopt de check vrijwel meteen (niets te doen), dus het is goedkoop.
on:
  workflow_dispatch: {}

# Voorkom dat twee runs elkaar overlappen
concurrency:
  group: check-summaries
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --omit=dev
      - run: node scripts/check-summaries.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      # Stuurt een spoilervrije pushmelding voor elke nieuw gevonden samenvatting.
      # Gaat op de summary_notified_at-kolom af, dus dubbel melden kan niet.
      - run: node scripts/send-push.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
